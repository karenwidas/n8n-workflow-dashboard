<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forecast — CoCard Tickets</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #00304F;
    --navy2:   #004570;
    --green:   #69932F;
    --green2:  #83b53a;
    --red:     #c0392b;
    --orange:  #d4622a;
    --amber:   #c68a00;
    --bg:      #eef2f5;
    --white:   #ffffff;
    --card:    #ffffff;
    --border:  #d8dfe6;
    --muted:   #7a8a96;
    --text:    #1a2a35;
    --text2:   #3d5060;

    --section-overdue:  #fdf1f0;
    --section-today:    #f0f7ea;
    --section-week:     #f0f5fa;
    --section-future:   #f5f0fa;
    --section-avail:    #f5f8fa;

    --dot-overdue: #c0392b;
    --dot-today:   #69932F;
    --dot-week:    #00304F;
    --dot-future:  #7c5cbf;
    --dot-avail:   #7a8a96;
  }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  #header {
    background: var(--navy);
    color: #fff;
    padding: 0 28px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  #header h1 {
    font-size: 18px;
    font-weight: normal;
    letter-spacing: .5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #header h1 span.icon { font-size: 20px; }
  .header-date {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: rgba(255,255,255,.6);
    letter-spacing: .5px;
  }
  #refresh-btn {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  #refresh-btn:hover { background: rgba(255,255,255,.22); }
  #refresh-btn.spinning { opacity: .6; pointer-events: none; }

  /* ── Layout ── */
  #main {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 52px);
  }

  /* ── Left Nav ── */
  #nav {
    background: var(--navy);
    padding: 20px 0;
    position: sticky;
    top: 52px;
    height: calc(100vh - 52px);
    overflow-y: auto;
  }
  .nav-section-label {
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,.35);
    padding: 16px 20px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    transition: background .12s;
    border-left: 3px solid transparent;
    color: rgba(255,255,255,.7);
    font-size: 13px;
    text-decoration: none;
  }
  .nav-item:hover { background: rgba(255,255,255,.07); }
  .nav-item.active {
    background: rgba(255,255,255,.1);
    border-left-color: var(--green);
    color: #fff;
  }
  .nav-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nav-count {
    margin-left: auto;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    background: rgba(255,255,255,.15);
    border-radius: 10px;
    padding: 1px 7px;
    color: rgba(255,255,255,.8);
  }
  .nav-count.has-items { background: var(--green); color: #fff; }
  .nav-count.overdue-count { background: var(--red); color: #fff; }

  /* ── Content ── */
  #content {
    padding: 28px 32px;
    overflow-y: auto;
  }

  /* ── Section ── */
  .section { margin-bottom: 36px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .section-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-title {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: .3px;
    color: var(--text);
    font-family: 'Georgia', serif;
  }
  .section-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Courier New', monospace;
    margin-left: 2px;
  }
  .section-count {
    margin-left: auto;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    color: var(--muted);
  }

  /* day group within Forecast */
  .day-group { margin-bottom: 22px; }
  .day-label {
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Courier New', monospace;
    margin-bottom: 7px;
    padding-left: 2px;
  }
  .day-label.today-label { color: var(--green); }
  .day-label.overdue-label { color: var(--red); }

  /* ── Ticket Card ── */
  .tkt {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: box-shadow .15s, border-color .15s;
  }
  .tkt:hover { box-shadow: 0 2px 10px rgba(0,48,79,.1); border-color: #b8c8d4; }
  .tkt.overdue { border-left: 4px solid var(--red); }
  .tkt.due-today { border-left: 4px solid var(--green); }
  .tkt.due-week  { border-left: 4px solid var(--navy2); }
  .tkt.due-future { border-left: 4px solid #7c5cbf; }
  .tkt.planned-only { border-left: 4px solid var(--amber); }

  .tkt-header {
    padding: 11px 14px 9px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
  }
  .tkt-toggle {
    width: 16px; height: 16px;
    margin-top: 2px;
    flex-shrink: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1;
    transition: transform .15s;
    user-select: none;
  }
  .tkt.expanded .tkt-toggle { transform: rotate(90deg); }

  .tkt-main { flex: 1; min-width: 0; }
  .tkt-subject {
    font-size: 14px;
    font-weight: bold;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tkt-meta {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .tkt-company {
    font-size: 11px;
    color: var(--muted);
  }
  .pill {
    font-size: 10px;
    font-family: 'Courier New', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: bold;
    letter-spacing: .2px;
  }
  .pill-type    { background: #e8f0f6; color: var(--navy); }
  .pill-pri-high   { background: #fde8e8; color: #a02020; }
  .pill-pri-medium { background: #fef3e0; color: #a06000; }
  .pill-pri-low    { background: #e8f6e8; color: #336622; }
  .pill-pri-normal { background: #f0f0f0; color: #555; }
  .pill-recurring  { background: #f0eafa; color: #5c3d9e; font-size: 11px; }

  .tkt-dates {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .date-badge {
    font-size: 11px;
    font-family: 'Courier New', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .date-badge.overdue-badge  { background: #fde8e8; color: var(--red); font-weight: bold; }
  .date-badge.today-badge    { background: #eaf5e0; color: #3a6010; font-weight: bold; }
  .date-badge.upcoming-badge { background: #e8f0f8; color: var(--navy); }
  .date-badge.planned-badge  { background: #fef8e8; color: #8a6000; }

  /* ── Expanded body ── */
  .tkt-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 14px 14px;
    background: #fafbfc;
  }
  .tkt.expanded .tkt-body { display: block; }

  /* inline edits */
  .edit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .edit-label {
    font-size: 11px;
    font-weight: bold;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    width: 70px;
    flex-shrink: 0;
  }
  .edit-input {
    font-size: 12px;
    font-family: 'Georgia', serif;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    background: var(--white);
    color: var(--text);
    transition: border-color .12s;
  }
  .edit-input:focus { outline: none; border-color: var(--green); }
  input[type="date"].edit-input { font-family: 'Courier New', monospace; }

  .status-btns { display: flex; gap: 5px; }
  .status-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    color: var(--text2);
    transition: all .12s;
  }
  .status-btn:hover { background: var(--bg); }
  .status-btn.close-btn { border-color: var(--red); color: var(--red); }
  .status-btn.close-btn:hover { background: #fde8e8; }
  .status-btn.open-btn  { border-color: var(--green); color: var(--green); }
  .status-btn.open-btn:hover  { background: #eaf5e0; }
  .status-btn.save-btn  { border-color: var(--navy); background: var(--navy); color: #fff; }
  .status-btn.save-btn:hover  { background: var(--navy2); }

  /* tasks in expanded view */
  .tasks-block { margin-top: 12px; }
  .tasks-label {
    font-size: 11px;
    font-weight: bold;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 7px;
  }
  .task-row-fc {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .task-row-fc:last-child { border-bottom: none; }
  .task-cb {
    width: 15px; height: 15px;
    margin-top: 2px;
    flex-shrink: 0;
    accent-color: var(--green);
    cursor: pointer;
  }
  .task-text {
    font-size: 13px;
    color: var(--text);
    flex: 1;
  }
  .task-text.done {
    text-decoration: line-through;
    color: var(--muted);
  }
  .task-status-badge {
    font-size: 10px;
    font-family: 'Courier New', monospace;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .task-status-badge.ip { background: #fef3e0; color: #a06000; }
  .task-status-badge.wt { background: #f0eafa; color: #5c3d9e; }

  .open-link {
    font-size: 11px;
    color: var(--navy);
    text-decoration: none;
    font-family: 'Courier New', monospace;
    padding: 3px 7px;
    border: 1px solid var(--navy);
    border-radius: 4px;
    flex-shrink: 0;
    transition: all .12s;
    margin-left: auto;
  }
  .open-link:hover { background: var(--navy); color: #fff; }

  /* ── Empty states ── */
  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  /* ── Loading / Toast ── */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,48,79,.15);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .loading-box {
    background: var(--white);
    border-radius: 12px;
    padding: 28px 40px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,48,79,.2);
  }
  .loading-box p { font-size: 14px; color: var(--muted); margin-top: 10px; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toasts {
    position: fixed;
    bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 300;
  }
  .toast {
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    color: #fff;
    box-shadow: 0 3px 12px rgba(0,0,0,.2);
    animation: slideIn .2s ease;
  }
  .toast.ok  { background: var(--green); }
  .toast.err { background: var(--red); }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* ── API config modal ── */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,48,79,.35);
    display: none; align-items: center; justify-content: center;
    z-index: 400;
  }
  .modal-bg.show { display: flex; }
  .modal-box {
    background: var(--white);
    border-radius: 10px;
    padding: 28px 32px;
    width: 400px;
    box-shadow: 0 8px 32px rgba(0,48,79,.25);
  }
  .modal-box h2 { font-size: 17px; margin-bottom: 8px; }
  .modal-box p  { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .finput {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: var(--white);
    transition: border-color .12s;
  }
  .finput:focus { outline: none; border-color: var(--green); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .btn {
    padding: 7px 16px;
    border-radius: 5px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    transition: all .12s;
  }
  .btn-primary { background: var(--navy); border-color: var(--navy); color: #fff; }
  .btn-primary:hover { background: var(--navy2); }

  /* ── Pending save bar (per ticket) ── */
  .save-bar {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .save-bar.visible { display: flex; }
  .save-bar-msg { font-size: 12px; color: var(--amber); font-style: italic; flex: 1; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    #main { grid-template-columns: 1fr; }
    #nav { display: none; }
    #content { padding: 16px; }
  }
</style>
</head>
<body>

<!-- API Config Modal -->
<div class="modal-bg" id="cfg-modal">
  <div class="modal-box">
    <h2>🔑 Connect to Airtable</h2>
    <p>Enter your Airtable Personal Access Token. Stored only in your browser's local storage.</p>
    <input type="password" class="finput" id="cfg-key" placeholder="pat…" />
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveApiKey()">Connect</button>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>Loading tickets…</p>
  </div>
</div>

<!-- Toasts -->
<div id="toasts"></div>

<!-- Header -->
<div id="header">
  <h1><span class="icon">📅</span> Forecast</h1>
  <span class="header-date" id="header-date"></span>
  <button id="refresh-btn" onclick="refreshAll()">↺ Refresh</button>
</div>

<!-- Main -->
<div id="main">

  <!-- Nav -->
  <nav id="nav">
    <div class="nav-section-label">Forecast</div>
    <a class="nav-item" href="#section-overdue" onclick="scrollTo('section-overdue')">
      <span class="nav-dot" style="background:var(--dot-overdue)"></span>
      Overdue
      <span class="nav-count overdue-count" id="nav-count-overdue">—</span>
    </a>
    <a class="nav-item" href="#section-today" onclick="scrollTo('section-today')">
      <span class="nav-dot" style="background:var(--dot-today)"></span>
      Today
      <span class="nav-count" id="nav-count-today">—</span>
    </a>
    <a class="nav-item" href="#section-week" onclick="scrollTo('section-week')">
      <span class="nav-dot" style="background:var(--dot-week)"></span>
      This Week
      <span class="nav-count" id="nav-count-week">—</span>
    </a>
    <a class="nav-item" href="#section-future" onclick="scrollTo('section-future')">
      <span class="nav-dot" style="background:var(--dot-future)"></span>
      Upcoming
      <span class="nav-count" id="nav-count-future">—</span>
    </a>

    <div class="nav-section-label" style="margin-top:8px;">Available</div>
    <a class="nav-item" href="#section-avail" onclick="scrollTo('section-avail')">
      <span class="nav-dot" style="background:var(--dot-avail)"></span>
      No Due Date
      <span class="nav-count" id="nav-count-avail">—</span>
    </a>

    <div class="nav-section-label" style="margin-top:16px;">Links</div>
    <a class="nav-item" href="ticket-manager.html" target="_blank">
      <span style="font-size:14px;">🎫</span>
      Ticket Manager
    </a>
    <a class="nav-item" href="index.html" target="_blank">
      <span style="font-size:14px;">🏠</span>
      Dashboard
    </a>
  </nav>

  <!-- Content -->
  <div id="content">
    <!-- sections injected by JS -->
  </div>

</div>

<script>
// ══════════════════════════════════════
// CONFIG — same constants as ticket-manager.html
// ══════════════════════════════════════
const AT   = 'https://api.airtable.com/v0';
const BASE = 'appZNBaOkwT4zAjgH'; // same base

const TF = {
  id:'fld0F5wRHSFO3HkMl', company:'fldnOGvAKjysqcvwt', contact:'fldlsMsvHy7Ox0Ok6',
  type:'fld5actTxHND0ETkD', status:'fld3djwQzzRgsO2bA', priority:'fldwm0abmxlanWuEY',
  channel:'fldKquNzh3hQwQAps', subject:'fldIsJTQjAYN7ajXl', due:'fldyDnxmdJUwDEtr1',
  planned:'fld76SUcpLTHEiu83', desc:'fldLSZwPikCVGMTGR', nextTask:'fldTxFgVq2DvZhH6A',
  created:'fldn0NIHSga9I1dd6', updated:'fld0V8axhiLl1occX', closed:'fldqLPuic5m4RcanL',
  tasks:'fldzfbSOdOxx6bMIk',
  recurring:'fldbKk0OyeF1fq3bv', recurringInterval:'flduhmYB4jF2CZI61',
  recurringFrequency:'fldLHVs5Vo0PCPICK', recurringSchedule:'fldwjELZJfJst5mEJ',
  recurringEnd:'fldFduNsWJtwwHwq7',
};
const SF = {
  id:'fldjlkXc7EWfZM9IV', task:'fldZKDhv2MogYM6xV', tickets:'fldS9lPWMkcf5Hr9r',
  order:'fldLPrjNWGqkCp9dm', status:'fldfTkbMH4xh9AfEb', planned:'fldQatx2uh8rjXt14',
  due:'fld1mEb0v51FvnIzj', notes:'fldgvcTe3mHQUIDk2',
};
const T_TKT  = 'tblRpGe7PVLHMRj8X';
const T_TASK = 'tblJJAQ3gXwPmrqhz';
const T_CO   = 'tblPEGS3d1QsE0KY1';
const CF_NAME = 'fldgddNMEx5h9t38q';

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let API_KEY = '';
let allTickets   = [];
let allCompanies = [];
let ticketTasks  = {}; // cache: ticketId → tasks[]
let pendingChanges = {}; // ticketId → { fieldId: val }

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Date in header
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  API_KEY = localStorage.getItem('at_tk') || '';
  if (!API_KEY) {
    hideLoading();
    document.getElementById('cfg-modal').classList.add('show');
    document.getElementById('cfg-key').addEventListener('keydown', e => { if (e.key==='Enter') saveApiKey(); });
    return;
  }
  load();
});

function saveApiKey() {
  const v = document.getElementById('cfg-key').value.trim();
  if (!v) { toast('Token required','err'); return; }
  API_KEY = v;
  localStorage.setItem('at_tk', v);
  document.getElementById('cfg-modal').classList.remove('show');
  load();
}

// ══════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════
async function atFetch(path, opts={}) {
  const r = await fetch(`${AT}/${BASE}/${path}`, {
    ...opts,
    headers: { Authorization: `Bearer ${API_KEY}`, 'Content-Type': 'application/json', ...(opts.headers||{}) },
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error?.message || `HTTP ${r.status}`);
  }
  return r.json();
}

async function atGet(table, params={}) {
  const qs = new URLSearchParams();
  qs.set('returnFieldsByFieldId', 'true');
  if (params.formula) qs.set('filterByFormula', params.formula);
  if (params.fields)  params.fields.forEach(f => qs.append('fields[]', f));
  if (params.sort)    params.sort.forEach((s,i) => {
    qs.append(`sort[${i}][field]`, s.f);
    qs.append(`sort[${i}][direction]`, s.d||'asc');
  });
  qs.set('pageSize', params.pageSize || 100);
  if (params.offset) qs.set('offset', params.offset);
  return atFetch(`${table}?${qs}`);
}

async function loadAll(table, params) {
  let records = [], offset;
  do {
    const d = await atGet(table, { ...params, offset });
    records = records.concat(d.records);
    offset = d.offset;
  } while (offset);
  return records;
}

async function atPatch(table, id, fields) {
  return atFetch(`${table}/${id}?returnFieldsByFieldId=true`, {
    method: 'PATCH',
    body: JSON.stringify({ fields }),
  });
}

function linkId(l) { return (l && typeof l === 'object') ? l.id : l; }
function sv(v)     { return v ? (typeof v === 'object' ? (v.name||'') : String(v)) : ''; }
function esc(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════
// LOAD
// ══════════════════════════════════════
async function load() {
  showLoading();
  try {
    const [tkts, cos] = await Promise.all([
      loadAll(T_TKT, {
        formula: `NOT({${TF.status}}="Closed")`,
        sort: [{ f: TF.due, d: 'asc' }],
      }),
      loadAll(T_CO, { fields: [CF_NAME] }),
    ]);
    allTickets   = tkts;
    allCompanies = cos;
    render();
  } catch(e) {
    toast(e.message, 'err');
  }
  hideLoading();
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.textContent = '↺ Loading…';
  await load();
  btn.classList.remove('spinning');
  btn.textContent = '↺ Refresh';
}

// ══════════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════════
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function startOfWeekStr() {
  const d = new Date();
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  return d.toISOString().split('T')[0];
}

function endOfWeekStr() {
  const d = new Date();
  const day = d.getDay();
  d.setDate(d.getDate() + (6 - day));
  return d.toISOString().split('T')[0];
}

function nextWeekStart() {
  const d = new Date();
  d.setDate(d.getDate() + (7 - d.getDay()));
  return d.toISOString().split('T')[0];
}

function formatDate(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  const date = new Date(Number(y), Number(m)-1, Number(d));
  return date.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function formatDayLabel(str) {
  if (!str) return str;
  const today = todayStr();
  const tomorrow = (() => { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; })();
  if (str === today) return 'Today';
  if (str === tomorrow) return 'Tomorrow';
  const [y, m, d] = str.split('-');
  const date = new Date(Number(y), Number(m)-1, Number(d));
  return date.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
}

function isOverdue(due) {
  return due && due < todayStr();
}

function resolveCompanyName(f) {
  const ids = f[TF.company] || [];
  if (!ids.length) return '';
  const id = linkId(ids[0]);
  const co = allCompanies.find(c => c.id === id);
  return co ? (co.fields[CF_NAME] || '') : '';
}

// ══════════════════════════════════════
// CATEGORIZE
// ══════════════════════════════════════
function categorize(tickets) {
  const today    = todayStr();
  const eow      = endOfWeekStr();
  const nws      = nextWeekStart();

  const overdue = [], dueToday = [], dueWeek = [], dueFuture = [], available = [];

  for (const t of tickets) {
    const f   = t.fields;
    const due = f[TF.due] || '';
    const pl  = f[TF.planned] || '';

    // Use whichever date is earlier (due takes precedence for bucketing)
    const effectiveDate = due || pl;

    if (!effectiveDate) {
      available.push(t);
    } else if (due && due < today) {
      overdue.push(t);
    } else if (due === today || (!due && pl === today)) {
      dueToday.push(t);
    } else if ((due && due <= eow) || (!due && pl && pl <= eow)) {
      dueWeek.push(t);
    } else {
      dueFuture.push(t);
    }
  }

  // Sort each group
  const byDate = (a, b) => {
    const ad = a.fields[TF.due] || a.fields[TF.planned] || '';
    const bd = b.fields[TF.due] || b.fields[TF.planned] || '';
    return ad < bd ? -1 : ad > bd ? 1 : 0;
  };
  overdue.sort(byDate);
  dueToday.sort(byDate);
  dueWeek.sort(byDate);
  dueFuture.sort(byDate);
  available.sort((a,b) => {
    const as = a.fields[TF.subject] || '';
    const bs = b.fields[TF.subject] || '';
    return as.localeCompare(bs);
  });

  return { overdue, dueToday, dueWeek, dueFuture, available };
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render() {
  const groups = categorize(allTickets);

  // Update nav counts
  setNavCount('nav-count-overdue', groups.overdue.length, true);
  setNavCount('nav-count-today',   groups.dueToday.length);
  setNavCount('nav-count-week',    groups.dueWeek.length);
  setNavCount('nav-count-future',  groups.dueFuture.length);
  setNavCount('nav-count-avail',   groups.available.length);

  const content = document.getElementById('content');
  content.innerHTML = '';

  // ── Forecast sections ──
  content.appendChild(renderForecastSection('section-overdue',
    'Overdue', 'var(--dot-overdue)', groups.overdue, 'overdue'));

  content.appendChild(renderForecastSection('section-today',
    'Today', 'var(--dot-today)', groups.dueToday, 'due-today'));

  content.appendChild(renderForecastSection('section-week',
    'This Week', 'var(--dot-week)', groups.dueWeek, 'due-week'));

  content.appendChild(renderForecastSection('section-future',
    'Upcoming', 'var(--dot-future)', groups.dueFuture, 'due-future', true));

  // ── Available section ──
  content.appendChild(renderAvailSection(groups.available));
}

function setNavCount(id, n, isOverdue=false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = n;
  el.className = 'nav-count' + (n > 0 ? (isOverdue ? ' overdue-count' : ' has-items') : '');
}

// Forecast section — groups by day
function renderForecastSection(anchorId, title, dotColor, tickets, cssClass, groupByDay=false) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = anchorId;

  const subText = (() => {
    if (cssClass === 'overdue') return 'Past due — needs attention';
    if (cssClass === 'due-today') return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    if (cssClass === 'due-week') return 'Through end of this week';
    return 'Beyond this week';
  })();

  sec.innerHTML = `
    <div class="section-header">
      <span class="section-dot" style="background:${dotColor}"></span>
      <span class="section-title">${title}</span>
      <span class="section-sub">${subText}</span>
      <span class="section-count">${tickets.length} ticket${tickets.length!==1?'s':''}</span>
    </div>
    <div class="section-body"></div>
  `;

  const body = sec.querySelector('.section-body');

  if (!tickets.length) {
    body.innerHTML = `<div class="empty-state">No tickets — you're clear ✓</div>`;
    return sec;
  }

  if (cssClass === 'due-future' || cssClass === 'due-week') {
    // Group by day
    const byDay = {};
    for (const t of tickets) {
      const key = t.fields[TF.due] || t.fields[TF.planned] || 'none';
      if (!byDay[key]) byDay[key] = [];
      byDay[key].push(t);
    }
    for (const [day, dayTickets] of Object.entries(byDay)) {
      const dg = document.createElement('div');
      dg.className = 'day-group';
      dg.innerHTML = `<div class="day-label">${formatDayLabel(day)}</div>`;
      dayTickets.forEach(t => dg.appendChild(buildTicketCard(t, cssClass)));
      body.appendChild(dg);
    }
  } else {
    tickets.forEach(t => body.appendChild(buildTicketCard(t, cssClass)));
  }

  return sec;
}

// Available section — flat alpha list
function renderAvailSection(tickets) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = 'section-avail';
  sec.innerHTML = `
    <div class="section-header">
      <span class="section-dot" style="background:var(--dot-avail)"></span>
      <span class="section-title">Available</span>
      <span class="section-sub">Open tickets with no due date</span>
      <span class="section-count">${tickets.length} ticket${tickets.length!==1?'s':''}</span>
    </div>
    <div class="section-body"></div>
  `;
  const body = sec.querySelector('.section-body');
  if (!tickets.length) {
    body.innerHTML = `<div class="empty-state">No undated open tickets</div>`;
  } else {
    tickets.forEach(t => body.appendChild(buildTicketCard(t, 'available')));
  }
  return sec;
}

// ══════════════════════════════════════
// TICKET CARD
// ══════════════════════════════════════
function buildTicketCard(ticket, cssClass) {
  const f  = ticket.fields;
  const id = ticket.id;
  const due     = f[TF.due]     || '';
  const planned = f[TF.planned] || '';
  const pri     = sv(f[TF.priority]);
  const type    = sv(f[TF.type]);
  const coName  = resolveCompanyName(f);
  const subject = f[TF.subject] || '(no subject)';
  const ticketNum = f[TF.id] ? `#${f[TF.id]}` : '';

  const today = todayStr();
  const isOv  = due && due < today;

  const card = document.createElement('div');
  card.className = `tkt ${cssClass}`;
  card.id = `tkt-${id}`;
  card.dataset.id = id;

  // date badges
  let dateBadge = '';
  if (due) {
    const cls = isOv ? 'overdue-badge' : (due === today ? 'today-badge' : 'upcoming-badge');
    const prefix = isOv ? '⚠ Due ' : '📅 ';
    dateBadge += `<span class="date-badge ${cls}">${prefix}${formatDate(due)}</span>`;
  }
  if (planned && planned !== due) {
    dateBadge += `<span class="date-badge planned-badge">🗓 ${formatDate(planned)}</span>`;
  }

  // priority pill
  let priPill = '';
  if (pri) {
    const cls = pri==='High' ? 'pill-pri-high' : pri==='Medium' ? 'pill-pri-medium' : pri==='Low' ? 'pill-pri-low' : 'pill-pri-normal';
    priPill = `<span class="pill ${cls}">${pri}</span>`;
  }
  const typePill  = type ? `<span class="pill pill-type">${type}</span>` : '';
  const recBadge  = f[TF.recurring] ? `<span class="pill pill-recurring">🔁 Recurring</span>` : '';

  card.innerHTML = `
    <div class="tkt-header" onclick="toggleCard('${id}')">
      <span class="tkt-toggle">▶</span>
      <div class="tkt-main">
        <div class="tkt-subject" title="${esc(subject)}">${esc(subject)}</div>
        <div class="tkt-meta">
          ${coName ? `<span class="tkt-company">${esc(coName)}</span>` : ''}
          ${ticketNum ? `<span class="pill pill-pri-normal">${ticketNum}</span>` : ''}
          ${priPill}${typePill}${recBadge}
        </div>
      </div>
      <div class="tkt-dates">${dateBadge}</div>
    </div>
    <div class="tkt-body" id="body-${id}">
      <div style="color:var(--muted);font-size:12px;padding:10px 0;">Loading…</div>
    </div>
  `;

  return card;
}

// ══════════════════════════════════════
// EXPAND / COLLAPSE
// ══════════════════════════════════════
async function toggleCard(id) {
  const card = document.getElementById(`tkt-${id}`);
  const isExpanded = card.classList.contains('expanded');

  if (isExpanded) {
    card.classList.remove('expanded');
    return;
  }

  card.classList.add('expanded');

  // Load tasks if not cached
  if (!ticketTasks[id]) {
    const ticket = allTickets.find(t => t.id === id);
    const taskLinks = ticket?.fields[TF.tasks] || [];
    if (taskLinks.length) {
      try {
        const ids = taskLinks.map(linkId).filter(Boolean);
        const formula = `OR(${ids.map(i=>`RECORD_ID()="${i}"`).join(',')})`;
        const data = await atGet(T_TASK, { formula });
        ticketTasks[id] = data.records.sort((a,b) =>
          (a.fields[SF.order]??9999) - (b.fields[SF.order]??9999)
        );
      } catch(e) {
        ticketTasks[id] = [];
      }
    } else {
      ticketTasks[id] = [];
    }
  }

  renderCardBody(id);
}

function renderCardBody(id) {
  const ticket = allTickets.find(t => t.id === id);
  if (!ticket) return;
  const f      = ticket.fields;
  const due    = f[TF.due]     || '';
  const planned= f[TF.planned] || '';
  const tasks  = ticketTasks[id] || [];
  const changes= pendingChanges[id] || {};

  const body = document.getElementById(`body-${id}`);
  if (!body) return;

  // Task list HTML
  let tasksHtml = '';
  if (tasks.length) {
    const rows = tasks.map(t => {
      const ts    = sv(t.fields[SF.status]);
      const done  = ts === 'Completed';
      const inProg= ts === 'In Progress';
      const wait  = ts === 'Waiting';
      const badge = inProg ? `<span class="task-status-badge ip">In Progress</span>` :
                    wait   ? `<span class="task-status-badge wt">Waiting</span>` : '';
      return `
        <div class="task-row-fc">
          <input type="checkbox" class="task-cb" ${done?'checked':''} onchange="toggleTask('${id}','${t.id}',this.checked)" />
          <span class="task-text ${done?'done':''}">${esc(t.fields[SF.task]||'(no name)')}</span>
          ${badge}
        </div>`;
    }).join('');
    tasksHtml = `<div class="tasks-block"><div class="tasks-label">Tasks (${tasks.length})</div>${rows}</div>`;
  }

  const dueVal     = changes[TF.due]     !== undefined ? changes[TF.due]     : due;
  const plannedVal = changes[TF.planned] !== undefined ? changes[TF.planned] : planned;
  const hasPending = Object.keys(changes).length > 0;

  body.innerHTML = `
    <div class="edit-row">
      <span class="edit-label">Due</span>
      <input type="date" class="edit-input" value="${esc(dueVal)}" onchange="queueChange('${id}','${TF.due}',this.value)" />
      <span class="edit-label" style="margin-left:10px;">Planned</span>
      <input type="date" class="edit-input" value="${esc(plannedVal)}" onchange="queueChange('${id}','${TF.planned}',this.value)" />
    </div>
    <div class="edit-row">
      <span class="edit-label">Status</span>
      <div class="status-btns">
        <button class="status-btn close-btn" onclick="closeTicket('${id}')">✓ Close</button>
        <button class="status-btn" onclick="openInManager('${id}')">↗ Open in Manager</button>
      </div>
    </div>
    ${tasksHtml}
    <div class="save-bar ${hasPending?'visible':''}" id="save-bar-${id}">
      <span class="save-bar-msg">Unsaved changes</span>
      <button class="status-btn" onclick="discardChanges('${id}')">Discard</button>
      <button class="status-btn save-btn" onclick="saveChanges('${id}')">Save</button>
    </div>
  `;
}

// ══════════════════════════════════════
// INLINE EDITS
// ══════════════════════════════════════
function queueChange(ticketId, fieldId, value) {
  if (!pendingChanges[ticketId]) pendingChanges[ticketId] = {};
  pendingChanges[ticketId][fieldId] = value || null;
  const bar = document.getElementById(`save-bar-${ticketId}`);
  if (bar) bar.classList.add('visible');
}

async function saveChanges(ticketId) {
  const changes = pendingChanges[ticketId];
  if (!changes || !Object.keys(changes).length) return;
  try {
    const updated = await atPatch(T_TKT, ticketId, changes);
    // Patch local state
    const idx = allTickets.findIndex(t => t.id === ticketId);
    if (idx >= 0) allTickets[idx] = { ...allTickets[idx], fields: { ...allTickets[idx].fields, ...updated.fields } };
    delete pendingChanges[ticketId];
    toast('Saved ✓', 'ok');
    render(); // re-bucket (date may have changed)
    // Re-expand if it moved section
    setTimeout(() => {
      const card = document.getElementById(`tkt-${ticketId}`);
      if (card && !card.classList.contains('expanded')) {
        card.classList.add('expanded');
        renderCardBody(ticketId);
      }
    }, 50);
  } catch(e) {
    toast('Save failed: ' + e.message, 'err');
  }
}

function discardChanges(ticketId) {
  delete pendingChanges[ticketId];
  renderCardBody(ticketId);
}

// ══════════════════════════════════════
// TASK TOGGLE
// ══════════════════════════════════════
async function toggleTask(ticketId, taskId, checked) {
  const newStatus = checked ? 'Completed' : 'To Do';
  // optimistic
  const tasks = ticketTasks[ticketId] || [];
  const idx = tasks.findIndex(t => t.id === taskId);
  if (idx >= 0) tasks[idx] = { ...tasks[idx], fields: { ...tasks[idx].fields, [SF.status]: newStatus } };
  renderCardBody(ticketId);
  try {
    await atPatch(T_TASK, taskId, { [SF.status]: newStatus });
    toast(checked ? 'Task completed ✓' : 'Task reopened', 'ok');
  } catch(e) {
    // revert
    if (idx >= 0) tasks[idx] = { ...tasks[idx], fields: { ...tasks[idx].fields, [SF.status]: checked ? 'To Do' : 'Completed' } };
    renderCardBody(ticketId);
    toast('Update failed: ' + e.message, 'err');
  }
}

// ══════════════════════════════════════
// CLOSE TICKET
// ══════════════════════════════════════
async function closeTicket(ticketId) {
  if (!confirm('Close this ticket?')) return;
  try {
    await atPatch(T_TKT, ticketId, {
      [TF.status]: 'Closed',
      [TF.closed]: new Date().toISOString(),
    });
    allTickets = allTickets.filter(t => t.id !== ticketId);
    toast('Ticket closed ✓', 'ok');
    render();
  } catch(e) {
    toast('Close failed: ' + e.message, 'err');
  }
}

// ══════════════════════════════════════
// OPEN IN MANAGER
// ══════════════════════════════════════
function openInManager(ticketId) {
  window.open(`ticket-manager.html#${ticketId}`, '_blank');
}

// ══════════════════════════════════════
// SCROLL TO SECTION
// ══════════════════════════════════════
function scrollTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // highlight active nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event?.currentTarget?.classList.add('active');
}

// ══════════════════════════════════════
// LOADING / TOAST
// ══════════════════════════════════════
function showLoading() { document.getElementById('loading-overlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }

function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
