<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#00304F"/>

  <!-- Calendar body -->
  <rect x="68" y="104" width="376" height="312" rx="22" fill="rgba(255,255,255,0.93)"/>

  <!-- Calendar header (green) -->
  <rect x="68" y="104" width="376" height="106" rx="22" fill="#69932F"/>
  <rect x="68" y="162" width="376" height="48" fill="#69932F"/>

  <!-- Binding rings -->
  <rect x="154" y="80" width="34" height="52" rx="13" fill="rgba(255,255,255,0.55)"/>
  <rect x="324" y="80" width="34" height="52" rx="13" fill="rgba(255,255,255,0.55)"/>

  <!-- Month label in header -->
  <rect x="192" y="124" width="128" height="14" rx="5" fill="rgba(255,255,255,0.55)"/>

  <!-- Day grid row 1 -->
  <circle cx="128" cy="278" r="20" fill="rgba(0,48,79,0.12)"/>
  <circle cx="192" cy="278" r="20" fill="rgba(0,48,79,0.12)"/>
  <circle cx="256" cy="278" r="24" fill="#69932F"/> <!-- today -->
  <circle cx="256" cy="278" r="12" fill="white" opacity="0.3"/> <!-- inner glow -->
  <circle cx="320" cy="278" r="20" fill="rgba(0,48,79,0.12)"/>
  <circle cx="384" cy="278" r="20" fill="rgba(0,48,79,0.12)"/>

  <!-- Day grid row 2 -->
  <circle cx="128" cy="348" r="20" fill="rgba(0,48,79,0.12)"/>
  <circle cx="192" cy="348" r="20" fill="rgba(0,48,79,0.12)"/>
  <!-- green dot indicator on one day -->
  <circle cx="192" cy="348" r="7" fill="#69932F"/>
  <circle cx="256" cy="348" r="20" fill="rgba(0,48,79,0.12)"/>
  <circle cx="320" cy="348" r="20" fill="rgba(0,48,79,0.12)"/>
  <circle cx="384" cy="348" r="20" fill="rgba(0,48,79,0.07)"/>
</svg>
