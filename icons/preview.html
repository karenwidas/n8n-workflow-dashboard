<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Preview — CoCard Apps</title>
<style>
  :root {
    --navy: #00304F;
    --green: #69932F;
    --bg: #eef2f5;
    --border: #c8d8e4;
    --text: #001f33;
    --muted: #6a8fa8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Tahoma, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px;
  }
  h1 {
    font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: var(--navy); margin-bottom: 32px;
  }
  .grid {
    display: flex; gap: 32px; flex-wrap: wrap;
  }
  .card {
    background: white; border-radius: 12px; padding: 28px 24px 22px;
    box-shadow: 0 2px 8px rgba(0,48,79,0.10);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    min-width: 200px;
  }
  .label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted);
  }
  .sizes {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    width: 100%;
  }
  .size-row {
    display: flex; align-items: center; gap: 12px; width: 100%;
  }
  .size-label {
    font-size: 10px; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; width: 32px; text-align: right;
    flex-shrink: 0;
  }
  .size-row img { display: block; }
  /* Dark bg swatch */
  .on-dark {
    background: #1a2a38; border-radius: 8px; padding: 8px 10px;
    display: flex; gap: 10px; align-items: center; margin-top: 8px;
  }
  .divider {
    width: 100%; height: 1px; background: var(--border); margin: 4px 0;
  }
</style>
</head>
<body>
  <h1>App Icon Preview</h1>
  <div class="grid">

    <!-- Dashboard -->
    <div class="card">
      <div class="label">Dashboard</div>
      <div class="sizes">
        <div class="size-row">
          <span class="size-label">512</span>
          <img src="icon-dashboard.svg" width="120" height="120" alt="Dashboard icon large"/>
        </div>
        <div class="size-row">
          <span class="size-label">64</span>
          <img src="icon-dashboard.svg" width="64" height="64" alt="Dashboard icon medium"/>
        </div>
        <div class="size-row">
          <span class="size-label">32</span>
          <img src="icon-dashboard.svg" width="32" height="32" alt="Dashboard icon small"/>
        </div>
        <div class="size-row">
          <span class="size-label">16</span>
          <img src="icon-dashboard.svg" width="16" height="16" alt="Dashboard icon tiny"/>
        </div>
      </div>
      <div class="divider"></div>
      <div class="on-dark">
        <img src="icon-dashboard.svg" width="44" height="44" alt="on dark"/>
        <span style="font-size:11px;color:rgba(255,255,255,0.5)">on dark bg</span>
      </div>
    </div>

    <!-- Ticket Manager -->
    <div class="card">
      <div class="label">Ticket Manager</div>
      <div class="sizes">
        <div class="size-row">
          <span class="size-label">512</span>
          <img src="icon-ticket-manager.svg" width="120" height="120" alt="Ticket Manager icon large"/>
        </div>
        <div class="size-row">
          <span class="size-label">64</span>
          <img src="icon-ticket-manager.svg" width="64" height="64" alt="Ticket Manager icon medium"/>
        </div>
        <div class="size-row">
          <span class="size-label">32</span>
          <img src="icon-ticket-manager.svg" width="32" height="32" alt="Ticket Manager icon small"/>
        </div>
        <div class="size-row">
          <span class="size-label">16</span>
          <img src="icon-ticket-manager.svg" width="16" height="16" alt="Ticket Manager icon tiny"/>
        </div>
      </div>
      <div class="divider"></div>
      <div class="on-dark">
        <img src="icon-ticket-manager.svg" width="44" height="44" alt="on dark"/>
        <span style="font-size:11px;color:rgba(255,255,255,0.5)">on dark bg</span>
      </div>
    </div>

    <!-- Forecast -->
    <div class="card">
      <div class="label">Forecast</div>
      <div class="sizes">
        <div class="size-row">
          <span class="size-label">512</span>
          <img src="icon-forecast.svg" width="120" height="120" alt="Forecast icon large"/>
        </div>
        <div class="size-row">
          <span class="size-label">64</span>
          <img src="icon-forecast.svg" width="64" height="64" alt="Forecast icon medium"/>
        </div>
        <div class="size-row">
          <span class="size-label">32</span>
          <img src="icon-forecast.svg" width="32" height="32" alt="Forecast icon small"/>
        </div>
        <div class="size-row">
          <span class="size-label">16</span>
          <img src="icon-forecast.svg" width="16" height="16" alt="Forecast icon tiny"/>
        </div>
      </div>
      <div class="divider"></div>
      <div class="on-dark">
        <img src="icon-forecast.svg" width="44" height="44" alt="on dark"/>
        <span style="font-size:11px;color:rgba(255,255,255,0.5)">on dark bg</span>
      </div>
    </div>

  </div>

  <p style="margin-top:32px; font-size:11px; color:var(--muted);">
    Icons shown at 120px · 64px · 32px · 16px. All are SVG — single file scales to any size.
  </p>
</body>
</html>
